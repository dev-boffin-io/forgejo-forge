name: Build GUI Windows AMD64

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build GUI Windows AMD64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (GitHub-hosted)
        id: setup_python
        uses: actions/setup-python@v5
        continue-on-error: true
        with:
          python-version: '3.12'

      - name: Fallback — system Python (Forgejo / self-hosted)
        if: steps.setup_python.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Host "actions/setup-python failed — checking system Python..."
          python --version

      - name: Install Python dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet pyinstaller pyqt6 pillow
          if (Test-Path gui/requirements.txt) {
            python -m pip install --quiet -r gui/requirements.txt
          }
        shell: pwsh

      - name: Build GUI
        run: |
          mkdir -p bin
          $icon = "$PWD\gui\forgejo-forge.png"
          pyinstaller `
            --onefile `
            --name forgejo-forge-gui-windows-amd64 `
            --distpath bin `
            --workpath .build `
            --specpath .spec `
            --add-data "$icon;." `
            --icon "$icon" `
            --windowed `
            gui/forgejo-forge.py
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: forgejo-forge-gui-windows-amd64
          path: bin/forgejo-forge-gui-windows-amd64.exe
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          files: bin/forgejo-forge-gui-windows-amd64.exe
          generate_release_notes: false
