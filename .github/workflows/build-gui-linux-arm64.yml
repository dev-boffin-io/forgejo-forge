name: Build GUI Linux ARM64

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build GUI Linux ARM64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            python3-venv \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet pyinstaller pyqt6
          if [ -f gui/requirements.txt ]; then
            .venv/bin/pip install --quiet -r gui/requirements.txt
          fi

      - name: Build GUI
        run: |
          mkdir -p bin
          ICON_ABS=$(realpath gui/forgejo-forge.png 2>/dev/null || echo "")
          .venv/bin/pyinstaller \
            --onefile \
            --strip \
            --name forgejo-forge-gui-arm64 \
            --distpath bin \
            --workpath .build \
            --specpath .spec \
            ${ICON_ABS:+--add-data "$ICON_ABS:."}  \
            gui/forgejo-forge.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgejo-forge-gui-linux-arm64
          path: bin/forgejo-forge-gui-arm64
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/forgejo-forge-gui-arm64
          generate_release_notes: false
