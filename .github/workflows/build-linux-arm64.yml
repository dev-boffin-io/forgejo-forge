name: Build Linux ARM64

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Linux ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Get version
        id: version
        run: echo "VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" >> $GITHUB_OUTPUT

      - name: Tidy main module
        run: go mod tidy

      - name: Build main binary
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          mkdir -p bin
          go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o bin/forgejo-forge-arm64 .

      - name: Tidy installer module
        working-directory: forgejo-installer
        run: go mod tidy

      - name: Build installer binary
        working-directory: forgejo-installer
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          mkdir -p ../bin
          go build \
            -ldflags "-s -w" \
            -o ../bin/forgejo-main-arm64 .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forgejo-forge-linux-arm64
          path: |
            bin/forgejo-forge-arm64
            bin/forgejo-main-arm64
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/forgejo-forge-arm64
            bin/forgejo-main-arm64
          generate_release_notes: false
