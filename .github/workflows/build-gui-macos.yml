name: Build GUI macOS

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build GUI macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: amd64
            runner: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (GitHub-hosted)
        id: setup_python
        uses: actions/setup-python@v5
        continue-on-error: true
        with:
          python-version: '3.12'

      - name: Fallback — system Python (Forgejo / self-hosted)
        if: steps.setup_python.outcome == 'failure'
        run: |
          echo "actions/setup-python failed — checking system Python..."
          python3 --version || python --version

      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet pyinstaller pyqt6 pillow
          if [ -f gui/requirements.txt ]; then
            .venv/bin/pip install --quiet -r gui/requirements.txt
          fi

      - name: Build GUI
        run: |
          mkdir -p bin
          ICON_ABS=$(realpath gui/forgejo-forge.png 2>/dev/null || echo "")
          .venv/bin/pyinstaller \
            --onefile \
            --name forgejo-forge-gui-darwin-${{ matrix.arch }} \
            --distpath bin \
            --workpath .build \
            --specpath .spec \
            ${ICON_ABS:+--add-data "$ICON_ABS:."} \
            ${ICON_ABS:+--icon "$ICON_ABS"} \
            --windowed \
            gui/forgejo-forge.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgejo-forge-gui-darwin-${{ matrix.arch }}
          path: bin/forgejo-forge-gui-darwin-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/forgejo-forge-gui-darwin-${{ matrix.arch }}
          generate_release_notes: false
